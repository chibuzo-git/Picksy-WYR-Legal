<!DOCTYPE html>

  <style>

      background: #0B0B0F;
      color: #f0f0f0;
      font-family: Georgia, serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container { text-align: center; padding: 48px 24px; }

    p { color: #888; font-size: 0.95rem; margin-bottom: 48px; }
    .links { display: flex; flex-direction: column; gap: 16px; align-items: center; }
    a { color: #a78bfa; text-decoration: none; font-size: 1.1rem; border-bottom: 1px solid rgba(167,139,250,0.3); padding-bottom: 2px; transition: color 0.2s; }
    a:hover { color: #c4b5fd; }
  </style>
</head>
<body>
  <div class="container">
    <h1>Picksy</h1>
    <p>Legal Documents</p>
    <div class="links">
      <a href="/privacy.html">Privacy Policy</a>

</html>
